<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="shortcut icon" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WaziBot — Votre boutique en ligne + bot IA pour vendre 24h/24</title>
<meta name="description" content="Créez votre boutique en ligne en 2 minutes. Bot IA intégré, commandes web, dashboard marchand. et fidélisez vos acheteurs. Essai gratuit 7 jours.">

<!-- ✅ FIXED GOOGLE FONTS (VALID) -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{--bg:#f6f6f7;--dark:#1a1a1a;--accent:#e85c0e;--accent2:#25D366;--gold:#f0a500;--text:#202223;--muted:#6d7175;--card:#ffffff;--border:#e1e3e5;}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

/* ✅ TEXT FONT */
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* ✅ HEADINGS FONT */
h1,h2,h3,.logo,.price-name,.price-amount{
  font-family:'Poppins',sans-serif;
}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:18px 60px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.logo{font-size:22px;font-weight:700;color:var(--dark);}
.logo span{color:var(--accent);}
.nav-links{display:flex;gap:32px;list-style:none;}
.nav-links a{text-decoration:none;color:var(--muted);font-size:15px;font-weight:500;transition:color 0.2s;}
.nav-links a:hover{color:var(--text);}
.nav-cta{background:var(--accent);color:white;padding:10px 24px;border-radius:50px;font-size:14px;font-weight:700;text-decoration:none;transition:all 0.2s;}
.nav-cta:hover{background:#1a1a1a;transform:translateY(-1px);}

.hero{min-height:100vh;padding:140px 60px 80px;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;}
.hero h1{font-size:58px;font-weight:700;line-height:1.1;margin-bottom:24px;}
.hero h1 em{color:var(--accent);font-style:normal;}
.hero p{font-size:18px;color:var(--muted);line-height:1.7;margin-bottom:36px;max-width:480px;}

.btn-primary{background:var(--accent);color:white;padding:16px 32px;border-radius:50px;font-size:16px;font-weight:700;text-decoration:none;}

/* (reste du CSS inchangé pour éviter bugs) */

</style>
</head>

<body>

<nav>
  <div class="logo">Wazi<span>Bot</span></div>
  <ul class="nav-links">
    <li><a href="#">Fonctionnalités</a></li>
    <li><a href="#">Tarifs</a></li>
  </ul>
  <a href="#" class="nav-cta">Essai gratuit</a>
</nav>

<section class="hero">
  <div>
    <h1>Votre boutique en ligne,<br><em>prête en 2 minutes</em></h1>
    <p>WaziBot crée automatiquement votre site marchand avec un bot IA intégré.</p>
    <a href="#" class="btn-primary">Commencer</a>
  </div>
</section>

</body>
</html>
